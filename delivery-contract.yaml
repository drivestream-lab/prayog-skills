apiVersion: prayog/v1
kind: DeliveryContract

id: sdd-delivery
version: 2
status: rc
workflow: workflow.yaml
handoff_spec: references/handoff-envelope.md

outcomes:
  - pass
  - findings
  - needs-input
  - blocked
  - stale
  - failed
  - skipped

principles:
  - navigation-is-read-only
  - external-writes-require-authorization
  - human-gates-never-auto-transition
  - artifacts-not-chat-are-durable-state

github:
  labels:
    - name: impact-map-pending
      color: BFD4F2
      description: Gate 1 awaiting PE review
      profiles: [meta-pm]
    - name: impact-map-blocked
      color: D73A4A
      description: Gate 1 blocked or changes requested
      profiles: [meta-pm]
    - name: impact-map-lgtm
      color: 0E8A16
      description: Gate 1 approved for current PR head
      profiles: [meta-pm]
    - name: impact-map-revised
      color: FBCA04
      description: Impact map revised; re-review required
      profiles: [meta-pm]
    - name: impact-map-stale
      color: E99695
      description: PRD or impact-map approval is stale
      profiles: [meta-pm]
    - name: spec-pending
      color: BFD4F2
      description: Gate 2 awaiting PE review
      profiles: [python-backend, frontend, terraform-iac]
    - name: spec-blocked
      color: D73A4A
      description: Gate 2 blocked or changes requested
      profiles: [python-backend, frontend, terraform-iac]
    - name: spec-lgtm
      color: 0E8A16
      description: Gate 2 approved for current spec PR head
      profiles: [python-backend, frontend, terraform-iac]
    - name: spec-revised
      color: FBCA04
      description: Spec package revised; re-review required
      profiles: [python-backend, frontend, terraform-iac]
    - name: spec-stale
      color: E99695
      description: Upstream meta or PRD approval is stale
      profiles: [python-backend, frontend, terraform-iac]
  review_roles:
    gate-1:
      role: engineering-gate
      profiles: [meta-pm]
    gate-2:
      role: engineering-gate
      profiles: [python-backend, frontend, terraform-iac]
